table: github_events
columns:
  - name: event_type
    type: String
    description: GitHub event type (e.g. PullRequestEvent, PushEvent, IssuesEvent)

  - name: action
    type: LowCardinality(String)
    description: Action within the event (e.g. opened, closed, reopened, synchronize)

  - name: actor_login
    type: String
    description: GitHub username of the actor who triggered the event

  - name: repo_name
    type: String
    description: Full repository name in owner/repo format (e.g. kubernetes/kubernetes)

  - name: created_at
    type: DateTime
    description: UTC timestamp when the event occurred

  - name: merged
    type: UInt8
    description: >
      Pre-migration field. 1 if the pull request was merged, 0 if not.
      Use merged = 1 to filter merged PRs and merged = 0 for unmerged.
      This field is the subject of the Act 2 schema migration
      (renamed to merged_at DateTime NULL in the post-migration schema).

  - name: number
    type: UInt32
    description: Pull request or issue number within the repository

  - name: title
    type: String
    description: Title of the pull request or issue
